<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#13181F"/>
      <stop offset="100%" stop-color="#1B222B"/>
    </linearGradient>
    <linearGradient id="layerGold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5494A8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#5494A8" stop-opacity="0.10"/>
    </linearGradient>
    <linearGradient id="layerTeal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9BA6B0" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#9BA6B0" stop-opacity="0.08"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="900" fill="url(#bg4)"/>

  <!-- Vanishing-perspective grid -->
  <g stroke="#5494A8" stroke-opacity="0.05" fill="none">
    <line x1="0" y1="450" x2="1200" y2="450"/>
    <line x1="0" y1="100" x2="600" y2="450"/>
    <line x1="0" y1="800" x2="600" y2="450"/>
    <line x1="1200" y1="100" x2="600" y2="450"/>
    <line x1="1200" y1="800" x2="600" y2="450"/>
  </g>

  <!-- Exploded layers (5), each translated diagonally to suggest disassembly -->
  <g>
    <g transform="translate(150,420)">
      <rect width="900" height="120" rx="2" fill="url(#layerGold)" stroke="#5494A8" stroke-opacity="0.5" stroke-width="1.5"/>
      <line x1="0" y1="60" x2="900" y2="60" stroke="#5494A8" stroke-opacity="0.25"/>
    </g>
    <g transform="translate(180,290)">
      <rect width="900" height="100" rx="2" fill="url(#layerTeal)" stroke="#9BA6B0" stroke-opacity="0.5" stroke-width="1.5"/>
      <line x1="0" y1="50" x2="900" y2="50" stroke="#9BA6B0" stroke-opacity="0.2"/>
    </g>
    <g transform="translate(210,170)">
      <rect width="900" height="90" rx="2" fill="url(#layerGold)" stroke="#5494A8" stroke-opacity="0.45" stroke-width="1.5"/>
    </g>
    <g transform="translate(120,570)">
      <rect width="900" height="100" rx="2" fill="url(#layerTeal)" stroke="#9BA6B0" stroke-opacity="0.45" stroke-width="1.5"/>
      <line x1="0" y1="50" x2="900" y2="50" stroke="#9BA6B0" stroke-opacity="0.2"/>
    </g>
    <g transform="translate(90,710)">
      <rect width="900" height="90" rx="2" fill="url(#layerGold)" stroke="#5494A8" stroke-opacity="0.4" stroke-width="1.5"/>
    </g>
  </g>

  <!-- "Callout" dashed lines linking layers -->
  <g stroke="#5494A8" stroke-opacity="0.45" stroke-dasharray="4 5" fill="none">
    <line x1="120" y1="755" x2="60" y2="820"/>
    <line x1="150" y1="480" x2="60" y2="540"/>
    <line x1="1110" y1="215" x2="1170" y2="120"/>
    <line x1="1110" y1="340" x2="1170" y2="300"/>
  </g>

  <!-- Small marker squares at layer corners -->
  <g fill="#5494A8">
    <rect x="56" y="816" width="8" height="8"/>
    <rect x="56" y="536" width="8" height="8"/>
    <rect x="1166" y="116" width="8" height="8"/>
    <rect x="1166" y="296" width="8" height="8"/>
  </g>
</svg>
