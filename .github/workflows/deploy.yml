name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch: {}

# Allow only one concurrent deployment, skipping runs queued between an in-progress run
# and the latest queued run. Don't cancel in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

env:
  # GitHub Pages serves project repos at https://<user>.github.io/<repo>/
  # Change this if you rename the repo or switch to a <user>.github.io repo (set to empty string).
  NEXT_PUBLIC_BASE_PATH: /niraj-portfolio

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build (static export)
        run: npm run build
        env:
          NEXT_PUBLIC_BASE_PATH: ${{ env.NEXT_PUBLIC_BASE_PATH }}
          NEXT_TELEMETRY_DISABLED: '1'

      - name: Ensure .nojekyll
        run: touch out/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
